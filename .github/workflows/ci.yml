name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          cache: pnpm
          node-version: 24

      - name: Install root dependencies
        run: pnpm install --frozen-lockfile

      - name: Install example dependencies
        run: pnpm install --frozen-lockfile
        working-directory: examples/react-first

      - name: Install simple example dependencies
        run: pnpm install --frozen-lockfile
        working-directory: examples/simple

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Example standalone test
        run: pnpm test
        working-directory: examples/react-first

      - name: Example standalone typecheck
        run: pnpm typecheck
        working-directory: examples/react-first

      - name: Simple example standalone test
        run: pnpm test
        working-directory: examples/simple

      - name: Simple example standalone typecheck
        run: pnpm typecheck
        working-directory: examples/simple
